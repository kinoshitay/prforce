<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRFORCE - 企業詳細</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e1117;
      color: #fafafa;
      min-height: 100vh;
    }
    nav {
      background: #1a1d27;
      border-bottom: 1px solid #2d3748;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 56px;
    }
    nav .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ff4b4b;
      margin-right: 16px;
    }
    nav a {
      color: #a0aec0;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active {
      color: #fafafa;
      background: #2d3748;
    }
    nav a.active { color: #ff4b4b; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #718096;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fafafa; }

    .company-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .company-header h1 {
      font-size: 32px;
      font-weight: 700;
    }
    .grade-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 700;
    }
    .grade-S { background: #7b3aed22; color: #a78bfa; border: 1px solid #7b3aed44; }
    .grade-A { background: #2563eb22; color: #60a5fa; border: 1px solid #2563eb44; }
    .grade-B { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .grade-C { background: #d9770622; color: #fb923c; border: 1px solid #d9770644; }
    .grade-D { background: #dc262622; color: #f87171; border: 1px solid #dc262644; }

    .total-score {
      font-size: 48px;
      font-weight: 800;
      color: #ff4b4b;
    }
    .total-score span {
      font-size: 20px;
      color: #718096;
      font-weight: 400;
    }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 32px; }

    .selector-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .selector-row label {
      font-size: 14px;
      color: #718096;
    }
    .selector-row select {
      background: #1a1d27;
      color: #fafafa;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .selector-row select:focus {
      outline: none;
      border-color: #ff4b4b;
    }

    .score-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    @media (max-width: 640px) {
      .score-cards { grid-template-columns: 1fr; }
    }
    .score-card {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 20px;
    }
    .score-card .card-label {
      font-size: 12px;
      color: #718096;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .score-card .card-value {
      font-size: 32px;
      font-weight: 700;
    }
    .score-card .card-max {
      font-size: 14px;
      color: #4a5568;
    }
    .score-card .card-bar {
      height: 6px;
      background: #2d3748;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }
    .score-card .card-bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    .info-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .info-chip {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #a0aec0;
    }
    .info-chip strong { color: #fafafa; }

    section { margin-bottom: 40px; }
    section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2d3748;
    }
    .chart-card {
      background: #1a1d27;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
    .updated { color: #4a5568; font-size: 12px; text-align: right; margin-top: 8px; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">PRFORCE</span>
    <a href="index.html">ランキング</a>
    <a href="company.html" class="active">企業詳細</a>
    <a href="compare.html">比較分析</a>
  </nav>
  <div class="container">
    <a href="index.html" class="back-link">&larr; ランキングに戻る</a>

    <div class="selector-row">
      <label for="company-select">企業を選択:</label>
      <select id="company-select"></select>
    </div>

    <div id="company-content"></div>
    <p class="updated" id="updated-at"></p>
  </div>

  <script>
    const COLORS = ["#4F8BF9","#FF6B6B","#FFD93D","#6BCB77","#FF922B","#DA77F2","#74C0FC","#A9E34B","#FFA8A8"];

    let allCompanies = [];

    fetch("data.json")
      .then(r => r.json())
      .then(data => {
        allCompanies = data.companies;
        document.getElementById("updated-at").textContent = "データ更新日: " + data.updated_at;

        // ドロップダウン構築
        const sel = document.getElementById("company-select");
        allCompanies.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.company_name;
          opt.textContent = c.company_name + " (" + c.grade + ")";
          sel.appendChild(opt);
        });

        // URLパラメータから初期選択
        const params = new URLSearchParams(location.search);
        const nameParam = params.get("name");
        if (nameParam && allCompanies.find(c => c.company_name === nameParam)) {
          sel.value = nameParam;
        }

        sel.addEventListener("change", () => {
          history.replaceState(null, "", "company.html?name=" + encodeURIComponent(sel.value));
          renderCompany(sel.value);
        });

        renderCompany(sel.value);
      });

    function renderCompany(name) {
      const c = allCompanies.find(x => x.company_name === name);
      if (!c) return;

      const volTotal = c.volume_score + c.recent_activity_score;
      const qualTotal = c.category_mix_score + c.consistency_score + c.growth_trajectory_score;

      document.getElementById("company-content").innerHTML = `
        <div class="company-header">
          <h1>${c.company_name}</h1>
          <span class="grade-badge grade-${c.grade}">${c.grade}</span>
          <div class="total-score">${c.total_score} <span>/ 100</span></div>
        </div>
        <p class="subtitle">${c.category || ""} | リリース総数 ${c.total_releases.toLocaleString()}件 | 活動月数 ${c.active_months}ヶ月</p>

        <div class="score-cards">
          <div class="score-card">
            <div class="card-label">量スコア</div>
            <div class="card-value" style="color:#4F8BF9">${volTotal.toFixed(1)} <span class="card-max">/ 30</span></div>
            <div class="card-bar"><div class="card-bar-fill" style="width:${volTotal/30*100}%;background:#4F8BF9"></div></div>
            <div style="margin-top:8px;font-size:12px;color:#718096">配信量: ${c.volume_score} / 20 | 継続活動: ${c.recent_activity_score} / 10</div>
          </div>
          <div class="score-card">
            <div class="card-label">質スコア</div>
            <div class="card-value" style="color:#6BCB77">${qualTotal.toFixed(1)} <span class="card-max">/ 40</span></div>
            <div class="card-bar"><div class="card-bar-fill" style="width:${qualTotal/40*100}%;background:#6BCB77"></div></div>
            <div style="margin-top:8px;font-size:12px;color:#718096">カテゴリミックス: ${c.category_mix_score} / 15 | 安定性: ${c.consistency_score} / 10 | 成長: ${c.growth_trajectory_score} / 15</div>
          </div>
          <div class="score-card">
            <div class="card-label">影響力スコア</div>
            <div class="card-value" style="color:#FF6B6B">${c.impact_score} <span class="card-max">/ 30</span></div>
            <div class="card-bar"><div class="card-bar-fill" style="width:${c.impact_score/30*100}%;background:#FF6B6B"></div></div>
            <div style="margin-top:8px;font-size:12px;color:#718096">カテゴリ重み合算スコア</div>
          </div>
        </div>

        <div class="charts-grid">
          <section>
            <h2>レーダーチャート</h2>
            <div class="chart-card"><div id="radar-chart"></div></div>
          </section>
          <section>
            <h2>カテゴリ分布</h2>
            <div class="chart-card"><div id="category-chart"></div></div>
          </section>
        </div>

        <section>
          <h2>月別リリース数</h2>
          <div class="chart-card"><div id="monthly-chart"></div></div>
        </section>
      `;

      // レーダーチャート
      const cats = ["配信量","継続活動","カテゴリミックス","継続安定性","成長トレンド","影響力"];
      const vals = [
        c.volume_score / 20 * 100,
        c.recent_activity_score / 10 * 100,
        c.category_mix_score / 15 * 100,
        c.consistency_score / 10 * 100,
        c.growth_trajectory_score / 15 * 100,
        c.impact_score / 30 * 100,
      ];
      Plotly.newPlot("radar-chart", [{
        type: "scatterpolar",
        r: [...vals, vals[0]],
        theta: [...cats, cats[0]],
        fill: "toself",
        name: c.company_name,
        line: { color: "#ff4b4b" },
        fillcolor: "rgba(255,75,75,0.2)",
      }], {
        polar: { radialaxis: { visible: true, range: [0, 100], color: "#718096" }, bgcolor: "rgba(0,0,0,0)" },
        showlegend: false,
        height: 350,
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: { color: "#fafafa" },
        margin: { t: 20, b: 20, l: 60, r: 60 },
      }, { responsive: true });

      // カテゴリ分布
      const topCats = c.top_categories_list || [];
      Plotly.newPlot("category-chart", [{
        type: "bar",
        x: topCats.map(t => t.count),
        y: topCats.map(t => t.name),
        orientation: "h",
        marker: { color: topCats.map((_, i) => COLORS[i % COLORS.length]) },
        text: topCats.map(t => t.count + "件"),
        textposition: "outside",
        textfont: { color: "#fafafa", size: 12 },
      }], {
        height: 300,
        xaxis: { color: "#718096", gridcolor: "#2d3748" },
        yaxis: { color: "#a0aec0", autorange: "reversed" },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: { color: "#fafafa" },
        margin: { t: 10, b: 40, l: 140, r: 60 },
      }, { responsive: true });

      // 月別リリース数
      const monthly = c.monthly_releases || [];
      Plotly.newPlot("monthly-chart", [{
        type: "scatter",
        mode: "lines+markers",
        x: monthly.map(m => m.year_month),
        y: monthly.map(m => m.count),
        line: { color: "#ff4b4b", width: 2 },
        marker: { size: 4, color: "#ff4b4b" },
        fill: "tozeroy",
        fillcolor: "rgba(255,75,75,0.1)",
      }], {
        height: 350,
        xaxis: { color: "#718096", gridcolor: "#2d3748", tickangle: -45, dtick: 3 },
        yaxis: { title: "リリース数", color: "#718096", gridcolor: "#2d3748" },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: { color: "#fafafa" },
        margin: { t: 10, b: 80, l: 50, r: 20 },
      }, { responsive: true });
    }
  </script>
</body>
</html>
