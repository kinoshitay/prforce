<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRFORCE - 広報力測定ダッシュボード</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root {
  --bg: #0e1117;
  --surface: #1a1d23;
  --border: #2d3139;
  --text: #fafafa;
  --text-sub: #a0a4ab;
  --accent: #4f8bf9;
  --gold: #ffd700;
  --green: #6bcb77;
  --red: #ff6b6b;
  --yellow: #ffd93d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

/* ナビ */
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 100; }
nav .inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; gap: 32px; }
nav .logo { font-size: 1.4em; font-weight: 800; color: var(--accent); text-decoration: none; letter-spacing: 1px; }
nav a { color: var(--text-sub); text-decoration: none; font-size: 0.95em; transition: color 0.2s; }
nav a:hover, nav a.active { color: var(--text); }

/* メトリクスカード */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 24px 0; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.metric-card .label { color: var(--text-sub); font-size: 0.85em; margin-bottom: 4px; }
.metric-card .value { font-size: 1.8em; font-weight: 700; }

/* ランキングテーブル */
.ranking-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
.ranking-table th { background: var(--surface); color: var(--text-sub); padding: 12px 16px; text-align: left; font-size: 0.85em; border-bottom: 2px solid var(--border); position: sticky; top: 56px; }
.ranking-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.ranking-table tr:hover { background: var(--surface); }
.ranking-table .rank { font-weight: 700; font-size: 1.1em; width: 50px; text-align: center; }
.ranking-table .company-name { font-weight: 600; }
.ranking-table .company-name a { color: var(--accent); text-decoration: none; }
.ranking-table .company-name a:hover { text-decoration: underline; }

/* グレードバッジ */
.grade { display: inline-block; padding: 2px 10px; border-radius: 6px; font-weight: 700; font-size: 0.9em; }
.grade-S { background: rgba(255,215,0,0.2); color: var(--gold); }
.grade-A { background: rgba(79,139,249,0.2); color: var(--accent); }
.grade-B { background: rgba(107,203,119,0.2); color: var(--green); }
.grade-C { background: rgba(255,217,61,0.2); color: var(--yellow); }
.grade-D { background: rgba(255,107,107,0.2); color: var(--red); }

/* プログレスバー */
.progress-bar { background: var(--border); border-radius: 4px; height: 8px; width: 100%; min-width: 80px; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

/* セクション */
h1 { font-size: 1.8em; margin: 16px 0; }
h2 { font-size: 1.3em; margin: 24px 0 12px; color: var(--text-sub); }
.section { margin: 32px 0; }

/* チャートコンテナ */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }

/* フッター */
footer { border-top: 1px solid var(--border); margin-top: 48px; padding: 24px 0; color: var(--text-sub); font-size: 0.85em; text-align: center; }
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">PRFORCE</a>
    <a href="index.html" class="active">ランキング</a>
    <a href="company.html">企業詳細</a>
    <a href="compare.html">比較分析</a>
  </div>
</nav>

<div class="container">
  <h1>📣 広報力測定ダッシュボード</h1>
  <p style="color:var(--text-sub); margin-bottom: 8px;">PR Timesのプレスリリースデータをもとに、スタートアップの広報力を定量スコアリング</p>

  <div class="metrics" id="metrics"></div>

  <div class="section">
    <h2>🏆 広報力ランキング</h2>
    <table class="ranking-table" id="ranking-table">
      <thead>
        <tr>
          <th>順位</th>
          <th>企業名</th>
          <th>カテゴリ</th>
          <th>総合スコア</th>
          <th>グレード</th>
          <th>量 (30)</th>
          <th>質 (40)</th>
          <th>影響力 (30)</th>
          <th>リリース数</th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>

  <div class="section chart-row">
    <div>
      <h2>📊 スコア構成比較（レーダー）</h2>
      <div id="radar-chart"></div>
    </div>
    <div>
      <h2>📈 総合スコア比較（積上げ棒）</h2>
      <div id="bar-chart"></div>
    </div>
  </div>

  <footer>
    データソース: PR Times | スコア算出: 量(30点) + 質(40点) + 影響力(30点) | Powered by PRFORCE
  </footer>
</div>

<script>
const COLORS = ['#4F8BF9','#FF6B6B','#FFD93D','#6BCB77','#FF922B','#DA77F2','#74C0FC','#A9E34B','#FFA8A8'];
const plotLayout = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  font: { color: '#fafafa' },
};

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    renderMetrics(data);
    renderRanking(data.companies);
    renderRadar(data.companies);
    renderBar(data.companies);
  });

function renderMetrics(data) {
  const el = document.getElementById('metrics');
  el.innerHTML = `
    <div class="metric-card"><div class="label">対象企業数</div><div class="value">${data.total_companies} 社</div></div>
    <div class="metric-card"><div class="label">総リリース件数</div><div class="value">${data.total_releases.toLocaleString()} 件</div></div>
    <div class="metric-card"><div class="label">平均スコア</div><div class="value">${data.avg_score} / 100</div></div>
    <div class="metric-card"><div class="label">データ更新日</div><div class="value">${data.updated_at}</div></div>
  `;
}

function renderRanking(companies) {
  const tbody = document.getElementById('ranking-body');
  companies.forEach((s, i) => {
    const q = s.volume_score + s.recent_activity_score;
    const qual = s.category_mix_score + s.consistency_score + s.growth_trajectory_score;
    const pct = s.total_score;
    tbody.innerHTML += `
      <tr>
        <td class="rank">${i + 1}</td>
        <td class="company-name"><a href="company.html?id=${s.company_id}">${s.company_name}</a></td>
        <td>${s.category}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-weight:600;min-width:40px;">${pct}</span>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div></div>
          </div>
        </td>
        <td><span class="grade grade-${s.grade}">${s.grade}</span></td>
        <td>${q.toFixed(1)}</td>
        <td>${qual.toFixed(1)}</td>
        <td>${s.impact_score}</td>
        <td>${s.total_releases.toLocaleString()}</td>
      </tr>`;
  });
}

function renderRadar(companies) {
  const cats = ['配信量','継続活動','カテゴリMix','継続安定性','成長トレンド','影響力'];
  const traces = companies.map((s, i) => {
    const vals = [
      s.volume_score / 20 * 100,
      s.recent_activity_score / 10 * 100,
      s.category_mix_score / 15 * 100,
      s.consistency_score / 10 * 100,
      s.growth_trajectory_score / 15 * 100,
      s.impact_score / 30 * 100,
    ];
    return {
      type: 'scatterpolar', r: [...vals, vals[0]], theta: [...cats, cats[0]],
      fill: 'toself', name: s.company_name, opacity: 0.6,
      line: { color: COLORS[i % COLORS.length] },
    };
  });
  Plotly.newPlot('radar-chart', traces, {
    ...plotLayout,
    polar: { radialaxis: { visible: true, range: [0, 100], color: '#555' }, bgcolor: 'rgba(0,0,0,0)' },
    showlegend: true, height: 500,
    legend: { font: { size: 11 } },
  }, { responsive: true });
}

function renderBar(companies) {
  const names = companies.map(s => s.company_name);
  const traces = [
    { name: '量スコア', y: companies.map(s => s.volume_score + s.recent_activity_score), marker: { color: '#4F8BF9' } },
    { name: '質スコア', y: companies.map(s => s.category_mix_score + s.consistency_score + s.growth_trajectory_score), marker: { color: '#6BCB77' } },
    { name: '影響力', y: companies.map(s => s.impact_score), marker: { color: '#FF6B6B' } },
  ].map(t => ({ ...t, type: 'bar', x: names }));

  Plotly.newPlot('bar-chart', traces, {
    ...plotLayout, barmode: 'stack', height: 500,
    xaxis: { tickangle: -30 }, yaxis: { title: 'スコア (0-100)' },
    legend: { orientation: 'h', y: 1.1 },
  }, { responsive: true });
}
</script>
</body>
</html>
