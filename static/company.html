<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業詳細 | PRFORCE</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root { --bg:#0e1117;--surface:#1a1d23;--border:#2d3139;--text:#fafafa;--text-sub:#a0a4ab;--accent:#4f8bf9;--gold:#ffd700;--green:#6bcb77;--red:#ff6b6b;--yellow:#ffd93d; }
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 0;position:sticky;top:0;z-index:100;}
nav .inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:32px;}
nav .logo{font-size:1.4em;font-weight:800;color:var(--accent);text-decoration:none;letter-spacing:1px;}
nav a{color:var(--text-sub);text-decoration:none;font-size:0.95em;transition:color 0.2s;}
nav a:hover,nav a.active{color:var(--text);}

.company-selector{margin:20px 0;}
.company-selector select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:1em;width:100%;max-width:400px;cursor:pointer;}
.company-selector select:focus{outline:none;border-color:var(--accent);}

.header-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0;}
.header-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;}
.header-card .label{color:var(--text-sub);font-size:0.85em;margin-bottom:4px;}
.header-card .value{font-size:1.6em;font-weight:700;}

.grade-badge{display:inline-block;padding:4px 16px;border-radius:8px;font-weight:800;font-size:1.4em;}
.grade-S{background:rgba(255,215,0,0.2);color:var(--gold);}
.grade-A{background:rgba(79,139,249,0.2);color:var(--accent);}
.grade-B{background:rgba(107,203,119,0.2);color:var(--green);}
.grade-C{background:rgba(255,217,61,0.2);color:var(--yellow);}
.grade-D{background:rgba(255,107,107,0.2);color:var(--red);}

h1{font-size:1.8em;margin:16px 0;}
h2{font-size:1.3em;margin:24px 0 12px;color:var(--text-sub);}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:768px){.chart-row{grid-template-columns:1fr;}}

.releases-table{width:100%;border-collapse:collapse;margin:16px 0;}
.releases-table th{background:var(--surface);color:var(--text-sub);padding:10px 12px;text-align:left;font-size:0.85em;border-bottom:2px solid var(--border);}
.releases-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.9em;}
.releases-table tr:hover{background:var(--surface);}
.releases-table a{color:var(--accent);text-decoration:none;}
.releases-table a:hover{text-decoration:underline;}

.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.8em;background:rgba(79,139,249,0.15);color:var(--accent);}

footer{border-top:1px solid var(--border);margin-top:48px;padding:24px 0;color:var(--text-sub);font-size:0.85em;text-align:center;}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">PRFORCE</a>
    <a href="index.html">ランキング</a>
    <a href="company.html" class="active">企業詳細</a>
    <a href="compare.html">比較分析</a>
  </div>
</nav>

<div class="container">
  <div class="company-selector">
    <select id="company-select"></select>
  </div>

  <div id="company-content" style="display:none">
    <h1 id="company-title"></h1>
    <div class="header-cards" id="header-cards"></div>

    <div class="section">
      <h2>📊 スコア内訳</h2>
      <div id="score-breakdown"></div>
    </div>

    <div class="chart-row">
      <div>
        <h2>📅 月別リリース件数推移</h2>
        <div id="monthly-chart"></div>
      </div>
      <div>
        <h2>🏷️ カテゴリ分布</h2>
        <div id="pie-chart"></div>
      </div>
    </div>

    <div class="section">
      <h2>📈 直近12ヶ月 カテゴリ別リリース数</h2>
      <div id="cat-monthly-chart"></div>
    </div>

    <div class="section">
      <h2>⚡ 直近リリース（最新10件）</h2>
      <table class="releases-table">
        <thead><tr><th>日付</th><th>タイトル</th><th>カテゴリ</th><th>リンク</th></tr></thead>
        <tbody id="releases-body"></tbody>
      </table>
    </div>
  </div>

  <footer>Powered by PRFORCE</footer>
</div>

<script>
const plotLayout = { paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)', font:{color:'#fafafa'} };
const SCORE_COLORS = { '配信量':'#4F8BF9','継続活動':'#74C0FC','カテゴリMix':'#6BCB77','継続安定性':'#A9E34B','成長トレンド':'#FFD93D','インパクト':'#FF6B6B' };
let DATA = null;

fetch('data.json').then(r=>r.json()).then(data=>{
  DATA = data;
  const select = document.getElementById('company-select');
  data.companies.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.company_id;
    opt.textContent = `${c.company_name} (${c.total_score}pt ${c.grade})`;
    select.appendChild(opt);
  });
  // URLパラメータからIDを取得
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(id) select.value = id;
  select.addEventListener('change', ()=> renderCompany(select.value));
  renderCompany(select.value);
});

function renderCompany(companyId) {
  const co = DATA.companies.find(c=> c.company_id === companyId);
  if(!co) return;

  document.getElementById('company-content').style.display = 'block';
  document.getElementById('company-title').textContent = `📣 ${co.company_name}`;

  // ヘッダーカード
  const gradeClass = `grade-${co.grade}`;
  document.getElementById('header-cards').innerHTML = `
    <div class="header-card"><div class="label">総合スコア</div><div class="value">${co.total_score} / 100</div></div>
    <div class="header-card"><div class="label">グレード</div><div class="value"><span class="grade-badge ${gradeClass}">${co.grade}</span></div></div>
    <div class="header-card"><div class="label">総リリース件数</div><div class="value">${co.total_releases.toLocaleString()} 件</div></div>
    <div class="header-card"><div class="label">対象期間</div><div class="value" style="font-size:1em">${co.date_from} 〜 ${co.date_to}</div></div>
  `;

  // スコア内訳 横棒グラフ
  const items = [
    {name:'配信量', val:co.volume_score, max:20},
    {name:'継続活動', val:co.recent_activity_score, max:10},
    {name:'カテゴリMix', val:co.category_mix_score, max:15},
    {name:'継続安定性', val:co.consistency_score, max:10},
    {name:'成長トレンド', val:co.growth_trajectory_score, max:15},
    {name:'インパクト', val:co.impact_score, max:30},
  ];
  Plotly.newPlot('score-breakdown', [{
    type:'bar', orientation:'h',
    y: items.map(i=> `${i.name} (${i.val}/${i.max})`).reverse(),
    x: items.map(i=> i.val / i.max * 100).reverse(),
    marker: { color: Object.values(SCORE_COLORS).reverse() },
    text: items.map(i=> `${i.val}/${i.max}pt`).reverse(),
    textposition: 'outside',
  }], { ...plotLayout, height:300, xaxis:{title:'達成率 (%)',range:[0,120]}, margin:{l:180} }, {responsive:true});

  // 月別推移
  const monthly = co.monthly_releases || [];
  const months = monthly.map(m=>m.year_month);
  const counts = monthly.map(m=>m.count);
  // 3ヶ月移動平均
  const ma = counts.map((_,i)=>{
    const start = Math.max(0, i-2);
    const slice = counts.slice(start, i+1);
    return slice.reduce((a,b)=>a+b,0)/slice.length;
  });
  Plotly.newPlot('monthly-chart', [
    {type:'bar', x:months, y:counts, name:'リリース件数', marker:{color:'#4F8BF9'}},
    {type:'scatter', mode:'lines', x:months, y:ma, name:'3ヶ月移動平均', line:{color:'#FFD93D',width:2}},
  ], { ...plotLayout, height:400, xaxis:{tickangle:-45}, yaxis:{title:'件数'} }, {responsive:true});

  // カテゴリ分布 パイチャート
  const catDist = co.category_distribution || [];
  Plotly.newPlot('pie-chart', [{
    type:'pie', hole:0.4,
    labels: catDist.map(c=>c.category_name),
    values: catDist.map(c=>c.count),
  }], { ...plotLayout, height:400 }, {responsive:true});

  // 直近12ヶ月カテゴリ別
  const catMonthly = co.category_monthly || [];
  const catNames = [...new Set(catMonthly.map(c=>c.category_name))];
  const catMonths = [...new Set(catMonthly.map(c=>c.year_month))].sort();
  const catTraces = catNames.map(cat => ({
    type:'bar', name:cat, x:catMonths,
    y: catMonths.map(m => {
      const found = catMonthly.find(c=> c.year_month===m && c.category_name===cat);
      return found ? found.count : 0;
    }),
  }));
  Plotly.newPlot('cat-monthly-chart', catTraces, {
    ...plotLayout, barmode:'stack', height:400, xaxis:{tickangle:-30}, yaxis:{title:'件数'},
  }, {responsive:true});

  // 直近リリース一覧
  const tbody = document.getElementById('releases-body');
  tbody.innerHTML = '';
  (co.recent_releases || []).forEach(r=>{
    tbody.innerHTML += `<tr>
      <td>${r.date}</td>
      <td>${r.title}</td>
      <td><span class="cat-badge">${r.category}</span></td>
      <td>${r.url ? `<a href="${r.url}" target="_blank">🔗 開く</a>` : ''}</td>
    </tr>`;
  });

  // URL更新
  history.replaceState(null, '', `company.html?id=${companyId}`);
}
</script>
</body>
</html>
