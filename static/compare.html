<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>比較分析 | PRFORCE</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root{--bg:#0e1117;--surface:#1a1d23;--border:#2d3139;--text:#fafafa;--text-sub:#a0a4ab;--accent:#4f8bf9;--gold:#ffd700;--green:#6bcb77;--red:#ff6b6b;--yellow:#ffd93d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 0;position:sticky;top:0;z-index:100;}
nav .inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:32px;}
nav .logo{font-size:1.4em;font-weight:800;color:var(--accent);text-decoration:none;letter-spacing:1px;}
nav a{color:var(--text-sub);text-decoration:none;font-size:0.95em;transition:color 0.2s;}
nav a:hover,nav a.active{color:var(--text);}

h1{font-size:1.8em;margin:16px 0;}
h2{font-size:1.3em;margin:24px 0 12px;color:var(--text-sub);}

.selector-area{margin:20px 0;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.chip{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);cursor:pointer;font-size:0.9em;transition:all 0.2s;user-select:none;}
.chip.selected{background:var(--accent);color:white;border-color:var(--accent);}
.chip:hover{border-color:var(--accent);}

.score-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:20px 0;}
.score-card{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px;text-align:center;transition:border-color 0.2s;}
.score-card h4{font-size:0.95em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-card .score-val{font-size:2em;font-weight:800;margin:4px 0;}
.score-card .grade-label{font-size:0.9em;font-weight:600;}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media(max-width:768px){.chart-row{grid-template-columns:1fr;}}

.summary-table{width:100%;border-collapse:collapse;margin:16px 0;}
.summary-table th{background:var(--surface);color:var(--text-sub);padding:10px 12px;text-align:left;font-size:0.85em;border-bottom:2px solid var(--border);}
.summary-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.summary-table tr:hover{background:var(--surface);}

footer{border-top:1px solid var(--border);margin-top:48px;padding:24px 0;color:var(--text-sub);font-size:0.85em;text-align:center;}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">PRFORCE</a>
    <a href="index.html">ランキング</a>
    <a href="company.html">企業詳細</a>
    <a href="compare.html" class="active">比較分析</a>
  </div>
</nav>

<div class="container">
  <h1>⚖️ 比較分析</h1>
  <p style="color:var(--text-sub);margin-bottom:8px;">2〜5社をクリックして比較</p>

  <div class="selector-area" id="selector"></div>

  <div id="compare-content" style="display:none">
    <div class="score-cards" id="score-cards"></div>

    <div class="chart-row">
      <div>
        <h2>📊 スコア内訳比較</h2>
        <div id="stack-chart"></div>
      </div>
      <div>
        <h2>🕸️ レーダー比較</h2>
        <div id="radar-chart"></div>
      </div>
    </div>

    <div class="section">
      <h2>📅 月別リリース数推移（3ヶ月移動平均）</h2>
      <div id="trend-chart"></div>
    </div>

    <div class="section">
      <h2>🏷️ カテゴリ分布比較</h2>
      <div id="cat-chart"></div>
    </div>

    <div class="section">
      <h2>📋 比較サマリー</h2>
      <table class="summary-table">
        <thead><tr><th>企業名</th><th>総合</th><th>グレード</th><th>量(30)</th><th>質(40)</th><th>影響力(30)</th><th>件数</th><th>活動月数</th></tr></thead>
        <tbody id="summary-body"></tbody>
      </table>
    </div>
  </div>

  <footer>Powered by PRFORCE</footer>
</div>

<script>
const COLORS = ['#4F8BF9','#FF6B6B','#6BCB77','#FFD93D','#DA77F2','#FF922B','#74C0FC','#A9E34B'];
const GRADE_COLORS = {S:'#ffd700',A:'#4f8bf9',B:'#6bcb77',C:'#ffd93d',D:'#ff6b6b'};
const plotLayout = { paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)', font:{color:'#fafafa'} };

let DATA = null;
let selected = new Set();

fetch('data.json').then(r=>r.json()).then(data=>{
  DATA = data;
  const selector = document.getElementById('selector');

  // デフォルトで上位4社を選択
  const defaults = data.companies.slice(0,4).map(c=>c.company_id);

  data.companies.forEach((c,i)=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (defaults.includes(c.company_id) ? ' selected' : '');
    chip.textContent = c.company_name;
    chip.dataset.id = c.company_id;
    chip.addEventListener('click', ()=> toggleCompany(chip));
    selector.appendChild(chip);
    if(defaults.includes(c.company_id)) selected.add(c.company_id);
  });

  renderComparison();
});

function toggleCompany(chip) {
  const id = chip.dataset.id;
  if(selected.has(id)) {
    selected.delete(id);
    chip.classList.remove('selected');
  } else {
    if(selected.size >= 5) return; // 最大5社
    selected.add(id);
    chip.classList.add('selected');
  }
  renderComparison();
}

function renderComparison() {
  if(selected.size < 2) {
    document.getElementById('compare-content').style.display = 'none';
    return;
  }
  document.getElementById('compare-content').style.display = 'block';

  const companies = DATA.companies.filter(c=> selected.has(c.company_id));
  const names = companies.map(c=>c.company_name);

  // スコアカード
  const cards = document.getElementById('score-cards');
  cards.innerHTML = companies.map((c,i)=>{
    const color = GRADE_COLORS[c.grade] || '#fff';
    return `<div class="score-card" style="border-color:${color}">
      <h4 style="color:${color}">${c.company_name}</h4>
      <div class="score-val" style="color:${color}">${c.total_score}</div>
      <div class="grade-label" style="color:${color}">グレード ${c.grade}</div>
    </div>`;
  }).join('');

  // 積上げ棒グラフ
  Plotly.newPlot('stack-chart', [
    {type:'bar',name:'量スコア(30)',x:names,y:companies.map(c=>c.volume_score+c.recent_activity_score),marker:{color:'#4F8BF9'},text:companies.map(c=>(c.volume_score+c.recent_activity_score).toFixed(1)),textposition:'inside'},
    {type:'bar',name:'質スコア(40)',x:names,y:companies.map(c=>c.category_mix_score+c.consistency_score+c.growth_trajectory_score),marker:{color:'#6BCB77'},text:companies.map(c=>(c.category_mix_score+c.consistency_score+c.growth_trajectory_score).toFixed(1)),textposition:'inside'},
    {type:'bar',name:'影響力(30)',x:names,y:companies.map(c=>c.impact_score),marker:{color:'#FF6B6B'},text:companies.map(c=>c.impact_score.toFixed(1)),textposition:'inside'},
  ], { ...plotLayout, barmode:'stack', height:450, yaxis:{title:'スコア (0-100)'}, legend:{orientation:'h',y:1.1} }, {responsive:true});

  // レーダー
  const cats = ['配信量','継続活動','カテゴリMix','継続安定性','成長トレンド','影響力'];
  const radarTraces = companies.map((c,i)=>{
    const vals = [c.volume_score/20*100,c.recent_activity_score/10*100,c.category_mix_score/15*100,c.consistency_score/10*100,c.growth_trajectory_score/15*100,c.impact_score/30*100];
    return {type:'scatterpolar',r:[...vals,vals[0]],theta:[...cats,cats[0]],fill:'toself',name:c.company_name,opacity:0.65,line:{color:COLORS[i%COLORS.length]}};
  });
  Plotly.newPlot('radar-chart', radarTraces, { ...plotLayout, polar:{radialaxis:{visible:true,range:[0,100],color:'#555'},bgcolor:'rgba(0,0,0,0)'}, height:450, legend:{font:{size:11}} }, {responsive:true});

  // 月別推移（3ヶ月移動平均）
  const allMonths = [...new Set(companies.flatMap(c=>(c.monthly_releases||[]).map(m=>m.year_month)))].sort();
  const trendTraces = companies.map((c,i)=>{
    const monthMap = Object.fromEntries((c.monthly_releases||[]).map(m=>[m.year_month,m.count]));
    const raw = allMonths.map(m=>monthMap[m]||0);
    const ma = raw.map((_,j)=>{
      const start = Math.max(0,j-2);
      const sl = raw.slice(start,j+1);
      return sl.reduce((a,b)=>a+b,0)/sl.length;
    });
    return {type:'scatter',mode:'lines',x:allMonths,y:ma,name:c.company_name,line:{color:COLORS[i%COLORS.length],width:2}};
  });
  Plotly.newPlot('trend-chart', trendTraces, {
    ...plotLayout, height:400, xaxis:{tickangle:-45,rangeslider:{visible:true},type:'category'},
    yaxis:{title:'件数（3ヶ月移動平均）'},
  }, {responsive:true});

  // カテゴリ比較
  const allCats = [...new Set(companies.flatMap(c=>(c.category_distribution||[]).map(d=>d.category_name)))];
  const catTraces = allCats.map(cat=>({
    type:'bar', name:cat,
    x: names,
    y: companies.map(c=>{
      const total = c.total_releases || 1;
      const found = (c.category_distribution||[]).find(d=>d.category_name===cat);
      return found ? Math.round(found.count/total*100*10)/10 : 0;
    }),
  }));
  Plotly.newPlot('cat-chart', catTraces, {
    ...plotLayout, barmode:'stack', height:400, yaxis:{title:'割合 (%)'},
  }, {responsive:true});

  // サマリーテーブル
  const tbody = document.getElementById('summary-body');
  tbody.innerHTML = companies.map(c=>`<tr>
    <td style="font-weight:600">${c.company_name}</td>
    <td>${c.total_score}</td>
    <td>${c.grade}</td>
    <td>${(c.volume_score+c.recent_activity_score).toFixed(1)}</td>
    <td>${(c.category_mix_score+c.consistency_score+c.growth_trajectory_score).toFixed(1)}</td>
    <td>${c.impact_score}</td>
    <td>${c.total_releases.toLocaleString()}</td>
    <td>${c.active_months}</td>
  </tr>`).join('');
}
</script>
</body>
</html>
